<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>PicShare</title>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22PicShare%22%2C%22short_name%22%3A%22PicShare%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%253D%2522http%253A%252F%252Fwww.w3.org%252F2000%252Fsvg%2522%2520viewBox%253D%25220%25200%2520100%2520100%2522%253E%253Crect%2520width%253D%2522100%2522%2520height%253D%2522100%2522%2520fill%253D%2522%2523000%2522%252F%253E%253Ctext%2520x%253D%252250%2522%2520y%253D%252265%2522%2520font-size%253D%252260%2522%2520text-anchor%253D%2522middle%2522%2520fill%253D%2522%2523fff%2522%253EP%253C%252Ftext%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%22any%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<style>
  :root{
    --bg:#0a0a0a; --panel:#141414; --panel2:#1c1c1c;
    --line:#2a2a2a; --line2:#383838;
    --txt:#f2f2f2; --muted:#9a9a9a; --muted2:#6a6a6a;
    --accent:#ffffff; --accent-ink:#000000;
    --fav:#ffffff; --danger:#ff5a5a; --ok:#4ade80;
    --r:4px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.5; min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}
  button{font-family:inherit; cursor:pointer}
  input,textarea,select{font-family:inherit}
  .mono{font-variant-numeric:tabular-nums}

  /* Layout */
  .wrap{max-width:1200px; margin:0 auto; padding:0 16px}
  header.topbar{
    position:sticky; top:0; z-index:50;
    background:rgba(10,10,10,.85); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .topbar .row{display:flex; align-items:center; gap:14px; height:58px}
  .brand{font-weight:700; letter-spacing:.5px; font-size:17px; display:flex; align-items:center; gap:8px}
  .brand .dot{width:9px; height:9px; background:var(--accent); border-radius:50%; display:inline-block}
  .spacer{flex:1}

  /* Buttons */
  .btn{
    background:var(--panel2); color:var(--txt); border:1px solid var(--line2);
    padding:9px 16px; border-radius:var(--r); font-size:14px; font-weight:500;
    transition:.15s; display:inline-flex; align-items:center; gap:7px; white-space:nowrap;
  }
  .btn:hover{border-color:#555; background:#242424}
  .btn.primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:600}
  .btn.primary:hover{background:#e2e2e2}
  .btn.ghost{background:transparent; border-color:var(--line2)}
  .btn.danger{color:var(--danger); border-color:#4a2a2a}
  .btn.danger:hover{background:#2a1818}
  .btn.sm{padding:6px 11px; font-size:13px}
  .btn:disabled{opacity:.4; cursor:not-allowed}

  /* Inputs */
  label.fld{display:block; margin-bottom:14px}
  label.fld span{display:block; font-size:13px; color:var(--muted); margin-bottom:6px}
  .inp{
    width:100%; background:var(--panel); border:1px solid var(--line2);
    color:var(--txt); padding:11px 13px; border-radius:var(--r); font-size:15px; outline:none;
  }
  .inp:focus{border-color:#666}
  textarea.inp{resize:vertical; min-height:70px}

  /* Cards */
  .card{background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:20px}
  .grid-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px}

  /* Gallery grid */
  .photo-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px}
  @media(min-width:700px){ .photo-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px} }
  .tile{
    position:relative; aspect-ratio:3/2; background:var(--panel2);
    border-radius:var(--r); overflow:hidden; cursor:pointer; border:1px solid var(--line);
  }
  .tile img{width:100%; height:100%; object-fit:cover; display:block; transition:.3s}
  .tile:hover img{transform:scale(1.04)}
  .tile .wm{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; opacity:.5}
  .tile .wm img{width:42%; height:auto; object-fit:contain; filter:drop-shadow(0 1px 4px rgba(0,0,0,.6))}
  .tile .favbadge{
    position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:50%;
    background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center;
    border:1px solid rgba(255,255,255,.25); transition:.15s;
  }
  .tile .favbadge svg{width:16px; height:16px}
  .tile.is-fav .favbadge{background:var(--fav); border-color:var(--fav)}
  .tile.is-fav .favbadge svg{fill:#000; stroke:#000}
  /* Auswahl-Badge (＋) links oben */
  .tile .selbadge{
    position:absolute; top:8px; left:8px; min-width:30px; height:30px; border-radius:16px; padding:0 8px;
    background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; gap:3px;
    border:1px solid rgba(255,255,255,.25); transition:.15s; font-size:15px; font-weight:700; color:#fff;
  }
  .tile.is-sel .selbadge{background:var(--accent); border-color:var(--accent); color:#000}
  .tile.is-sel{outline:2px solid var(--accent); outline-offset:-2px}
  .tile .selnum{font-size:12px; font-weight:700}
  .tile .cmtbadge{position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,.6); border-radius:20px; padding:2px 8px; font-size:11px; display:flex; gap:4px; align-items:center}
  /* Nach Bestätigung: gewählte grün hervorheben (Auswahl bleibt änderbar) */
  .grid-confirmed .tile.is-sel{outline:2px solid var(--ok); outline-offset:-2px}

  /* Modal */
  .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.85); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px}
  .modal{background:var(--panel); border:1px solid var(--line2); border-radius:10px; max-width:480px; width:100%; padding:26px; animation:pop .18s ease}
  @keyframes pop{from{transform:scale(.96); opacity:0} to{transform:scale(1); opacity:1}}
  .modal h3{margin:0 0 16px; font-size:19px}

  /* Lightbox */
  .lightbox{position:fixed; inset:0; background:#000; z-index:120; display:flex; flex-direction:column}
  .lb-stage{flex:1; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden}
  .lb-stage img{max-width:100%; max-height:100%; object-fit:contain}
  .lb-wm{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; opacity:.45}
  .lb-wm img{width:30%; filter:drop-shadow(0 2px 8px rgba(0,0,0,.7))}
  .lb-nav{position:absolute; top:50%; transform:translateY(-50%); width:52px; height:80px; background:rgba(20,20,20,.6); border:none; color:#fff; font-size:26px; display:flex; align-items:center; justify-content:center; border-radius:6px}
  .lb-nav.prev{left:14px} .lb-nav.next{right:14px}
  .lb-bar{display:flex; align-items:center; gap:12px; padding:14px 18px; border-top:1px solid #1c1c1c; background:#0a0a0a}
  .lb-side{position:absolute; right:0; top:0; bottom:0; width:320px; max-width:85vw; background:#0d0d0d; border-left:1px solid var(--line); transform:translateX(100%); transition:.25s; display:flex; flex-direction:column; z-index:5}
  .lb-side.open{transform:translateX(0)}

  /* Misc */
  .muted{color:var(--muted)} .muted2{color:var(--muted2)}
  .tag{display:inline-block; background:var(--panel2); border:1px solid var(--line2); border-radius:20px; padding:2px 10px; font-size:12px; color:var(--muted)}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#fff; color:#000; padding:11px 18px; border-radius:6px; font-weight:600; font-size:14px; z-index:200; animation:pop .2s ease; box-shadow:0 6px 24px rgba(0,0,0,.5)}
  .toast.err{background:var(--danger); color:#fff}
  .empty{text-align:center; padding:60px 20px; color:var(--muted2)}
  .hr{height:1px; background:var(--line); margin:18px 0; border:0}
  .pill-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px}
  .progress{height:6px; background:var(--panel2); border-radius:6px; overflow:hidden}
  .progress>div{height:100%; background:var(--accent); transition:.3s}
  .hidden{display:none!important}

  /* PIN gate */
  .gate{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px}
  .gate .card{max-width:380px; width:100%; text-align:center}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ======= KONFIG =======
const CONFIG = {
  FN_URL: "https://ugitunttmvswyxmyhnjb.supabase.co/functions/v1/picshare",
  THUMB_BASE: "https://ugitunttmvswyxmyhnjb.supabase.co/storage/v1/object/public/picshare-thumbs/",
  // Logo-Wasserzeichen (Daten-URL oder https). Platzhalter -> in Admin änderbar (localStorage).
  WATERMARK: localStorage.getItem("picshare_wm") || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 60'><text x='100' y='40' font-family='Arial' font-size='30' font-weight='bold' text-anchor='middle' fill='white'>LOGO</text></svg>",
  // Standard-Willkommenstext (Admin änderbar, pro Galerie überschreibbar)
  WELCOME_DEFAULT: localStorage.getItem("picshare_welcome") || "Herzlich willkommen zu deiner persönlichen Foto-Galerie!\n\nSchau dir die Bilder in Ruhe an und markiere deine Favoriten mit dem Herz-Symbol. Über das Kommentarfeld kannst du mir zu einzelnen Fotos Notizen hinterlassen.\n\nWenn du deine Auswahl getroffen hast, bestätige sie unten – ich kümmere mich dann um die Bearbeitung.\n\nViel Freude beim Aussuchen!\nAlexander Scherer"
};

// ======= STATE / HELPERS =======
const $ = (s,el=document)=>el.querySelector(s);
const app = $("#app");
let TOAST_T;
function toast(msg, err=false){
  clearTimeout(TOAST_T);
  let t=$(".toast"); if(t) t.remove();
  t=document.createElement("div"); t.className="toast"+(err?" err":""); t.textContent=msg;
  document.body.appendChild(t); TOAST_T=setTimeout(()=>t.remove(),2600);
}
async function api(action, body, token){
  const headers={"Content-Type":"application/json"};
  if(token) headers["Authorization"]="Bearer "+token;
  const res=await fetch(CONFIG.FN_URL+"?action="+action,{method:"POST",headers,body:JSON.stringify(body||{})});
  const data=await res.json().catch(()=>({error:"bad response"}));
  if(!res.ok) throw new Error(data.error||("HTTP "+res.status));
  return data;
}
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

// Router: ?g=<galleryId> -> Kundenansicht, sonst Admin
const params = new URLSearchParams(location.search);
const GALLERY_ID = params.get("g");

// ============================================================
// ====================  ADMIN-BEREICH  =======================
// ============================================================
const AdminState = { token:localStorage.getItem("picshare_atok")||null, galleries:[], current:null };

function renderAdmin(){
  if(!AdminState.token){ renderAdminLogin(); return; }
  loadAdminGalleries();
}

function renderAdminLogin(msg){
  app.innerHTML=`
  <div class="gate"><div class="card">
    <div class="brand" style="justify-content:center; margin-bottom:6px"><span class="dot"></span> PicShare</div>
    <p class="muted" style="margin:0 0 22px">Admin-Bereich</p>
    <label class="fld"><span>Benutzername</span><input class="inp" id="auser" autocomplete="username"></label>
    <label class="fld"><span>Passwort</span><input class="inp" id="apass" type="password" autocomplete="current-password"></label>
    ${msg?`<p style="color:var(--danger); font-size:13px; margin:-4px 0 14px">${esc(msg)}</p>`:""}
    <button class="btn primary" id="aLogin" style="width:100%; justify-content:center">Anmelden</button>
  </div></div>`;
  const go=async()=>{
    const username=$("#auser").value.trim(), password=$("#apass").value;
    if(!username||!password) return;
    $("#aLogin").disabled=true; $("#aLogin").textContent="…";
    try{
      const r=await api("admin_login",{username,password});
      AdminState.token=r.token; localStorage.setItem("picshare_atok",r.token);
      loadAdminGalleries();
    }catch(e){ renderAdminLogin(e.message); }
  };
  $("#aLogin").onclick=go;
  $("#apass").onkeydown=e=>{ if(e.key==="Enter") go(); };
}

function adminTopbar(extra=""){
  return `<header class="topbar"><div class="wrap"><div class="row">
    <div class="brand"><span class="dot"></span> PicShare <span class="muted2" style="font-weight:400; font-size:13px">Admin</span></div>
    <div class="spacer"></div>${extra}
    <button class="btn sm ghost" id="settingsBtn">Einstellungen</button>
    <button class="btn sm ghost" id="logoutBtn">Abmelden</button>
  </div></div></header>`;
}
function wireTopbar(){
  $("#logoutBtn").onclick=()=>{ localStorage.removeItem("picshare_atok"); AdminState.token=null; renderAdminLogin(); };
  $("#settingsBtn").onclick=openSettings;
}
function openSettings(){
  showModal(`<h3>Einstellungen</h3>
    <div style="display:flex; flex-direction:column; gap:10px; margin-top:6px">
      <button class="btn ghost" id="sLogo" style="justify-content:flex-start">🖼️ Logo-Wasserzeichen</button>
      <button class="btn ghost" id="sWelcome" style="justify-content:flex-start">✉️ Standard-Willkommenstext</button>
      <button class="btn ghost" id="sPass" style="justify-content:flex-start">🔑 Passwort ändern</button>
      <div class="hr" style="margin:6px 0"></div>
      <button class="btn ghost" id="sImpressum" style="justify-content:flex-start">📄 Impressum</button>
      <button class="btn ghost" id="sDatenschutz" style="justify-content:flex-start">🔒 Datenschutz</button>
    </div>
    <button class="btn primary" id="sClose" style="width:100%; justify-content:center; margin-top:18px">Schließen</button>`,(close)=>{
    $("#sClose").onclick=close;
    $("#sLogo").onclick=()=>{ close(); editWatermark(); };
    $("#sWelcome").onclick=()=>{ close(); editWelcomeDefault(); };
    $("#sPass").onclick=()=>{ close(); changePassword(); };
    $("#sImpressum").onclick=()=>{ close(); showLegal("impressum"); };
    $("#sDatenschutz").onclick=()=>{ close(); showLegal("datenschutz"); };
  });
}
function editWelcomeDefault(){
  showModal(`<h3>Standard-Willkommenstext</h3>
    <p class="muted" style="margin-top:0; font-size:13px">Wird allen Kunden beim Öffnen einer Galerie angezeigt – sofern die Galerie keinen eigenen Text hat. Zeilenumbrüche werden übernommen.</p>
    <label class="fld"><textarea class="inp" id="wdText" style="min-height:180px">${esc(CONFIG.WELCOME_DEFAULT)}</textarea></label>
    <div style="display:flex; gap:10px; margin-top:8px">
      <button class="btn ghost" style="flex:1" id="mC">Abbrechen</button>
      <button class="btn primary" style="flex:1" id="mS">Speichern</button>
    </div>`,(close)=>{
    $("#mC").onclick=close;
    $("#mS").onclick=()=>{ const v=$("#wdText").value; CONFIG.WELCOME_DEFAULT=v; localStorage.setItem("picshare_welcome",v); toast("Standardtext gespeichert"); close(); };
  });
}
function changePassword(){
  showModal(`<h3>Passwort ändern</h3>
    <label class="fld"><span>Aktuelles Passwort</span><input class="inp" id="cpCur" type="password" autocomplete="current-password"></label>
    <label class="fld"><span>Neues Passwort</span><input class="inp" id="cpNew" type="password" autocomplete="new-password" placeholder="mind. 6 Zeichen"></label>
    <label class="fld"><span>Neues Passwort wiederholen</span><input class="inp" id="cpNew2" type="password" autocomplete="new-password"></label>
    <div style="display:flex; gap:10px; margin-top:8px">
      <button class="btn ghost" style="flex:1" id="mC">Abbrechen</button>
      <button class="btn primary" style="flex:1" id="mS">Ändern</button>
    </div>`,(close)=>{
    $("#mC").onclick=close;
    $("#mS").onclick=async()=>{
      const cur=$("#cpCur").value, n1=$("#cpNew").value, n2=$("#cpNew2").value;
      if(n1.length<6){ toast("Neues Passwort: mind. 6 Zeichen", true); return; }
      if(n1!==n2){ toast("Passwörter stimmen nicht überein", true); return; }
      $("#mS").disabled=true; $("#mS").textContent="…";
      try{
        await api("admin_change_password",{current_password:cur, new_password:n1}, AdminState.token);
        toast("Passwort geändert ✓"); close();
      }catch(e){ toast(e.message, true); $("#mS").disabled=false; $("#mS").textContent="Ändern"; }
    };
  });
}
function editWatermark(){
  showModal(`<h3>Logo-Wasserzeichen</h3>
    <p class="muted" style="margin-top:0; font-size:13px">Bild-URL oder Daten-URL deines Logos (PNG mit Transparenz empfohlen). Wird über Vorschaubilder gelegt.</p>
    <label class="fld"><span>Logo-URL</span><input class="inp" id="wmUrl" value="${esc(CONFIG.WATERMARK)}"></label>
    <div style="text-align:center; margin:10px 0"><img src="${CONFIG.WATERMARK}" style="max-height:60px; max-width:100%; background:#333; padding:8px; border-radius:6px"></div>
    <label class="fld"><span>oder Datei hochladen</span><input class="inp" id="wmFile" type="file" accept="image/*"></label>
    <div style="display:flex; gap:10px; margin-top:16px">
      <button class="btn ghost" style="flex:1" id="mC">Abbrechen</button>
      <button class="btn primary" style="flex:1" id="mS">Speichern</button>
    </div>`,(close)=>{
    $("#wmFile").onchange=e=>{ const f=e.target.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>$("#wmUrl").value=rd.result; rd.readAsDataURL(f); };
    $("#mC").onclick=close;
    $("#mS").onclick=()=>{ const v=$("#wmUrl").value.trim(); if(v){ CONFIG.WATERMARK=v; localStorage.setItem("picshare_wm",v); toast("Logo gespeichert"); } close(); };
  });
}

async function loadAdminGalleries(){
  app.innerHTML=adminTopbar()+"<div class='wrap'><div class='empty'>Lädt…</div></div>";
  wireTopbar();
  try{
    const r=await api("admin_list_galleries",{},AdminState.token);
    AdminState.galleries=r.galleries||[];
    renderAdminList();
  }catch(e){
    if(/unauthorized/i.test(e.message)){ localStorage.removeItem("picshare_atok"); AdminState.token=null; renderAdminLogin("Bitte erneut anmelden."); }
    else app.innerHTML=adminTopbar()+`<div class='wrap'><div class='empty'>Fehler: ${esc(e.message)}</div></div>`, wireTopbar();
  }
}

function renderAdminList(){
  const gs=AdminState.galleries;
  app.innerHTML=adminTopbar(`<button class="btn sm primary" id="newGalleryBtn">+ Neue Galerie</button>`)+`
  <div class="wrap" style="padding:22px 16px 60px">
    <h2 style="margin:0 0 18px; font-size:22px">Galerien</h2>
    ${gs.length?`<div class="grid-cards">`+gs.map(g=>`
      <div class="card" data-gid="${g.id}" style="cursor:pointer; transition:.15s">
        <div style="display:flex; align-items:start; gap:10px">
          <div style="flex:1">
            <div style="font-size:17px; font-weight:600">${esc(g.title)}</div>
            ${g.client_name?`<div class="muted" style="font-size:13px">${esc(g.client_name)}</div>`:""}
          </div>
          ${g.confirmed?'<span class="tag" style="border-color:#2a4a2a; color:var(--ok)">✓ bestätigt</span>':'<span class="tag">offen</span>'}
        </div>
        <div class="hr"></div>
        <div style="display:flex; gap:16px; font-size:13px" class="muted">
          <span>${g.image_count} Fotos</span>
          <span>＋ ${g.selected_count??0} Auswahl</span>
          <span>❤ ${g.favorite_count} Fav</span>
        </div>
        <div style="margin-top:12px; display:flex; gap:8px">
          <button class="btn sm" data-open="${g.id}">Öffnen</button>
          <button class="btn sm ghost" data-link="${g.id}">Link</button>
          <button class="btn sm danger" data-del="${g.id}">Löschen</button>
        </div>
      </div>`).join("")+`</div>`
    :`<div class="empty">Noch keine Galerien.<br><br><button class="btn primary" id="emptyNew">+ Erste Galerie anlegen</button></div>`}
  </div>`;
  wireTopbar();
  const nb=$("#newGalleryBtn"); if(nb) nb.onclick=newGalleryModal;
  const en=$("#emptyNew"); if(en) en.onclick=newGalleryModal;
  app.querySelectorAll("[data-open]").forEach(b=>b.onclick=e=>{e.stopPropagation(); openAdminGallery(b.dataset.open);});
  app.querySelectorAll(".card[data-gid]").forEach(c=>c.onclick=()=>openAdminGallery(c.dataset.gid));
  app.querySelectorAll("[data-link]").forEach(b=>b.onclick=e=>{e.stopPropagation(); copyClientLink(b.dataset.link);});
  app.querySelectorAll("[data-del]").forEach(b=>b.onclick=e=>{e.stopPropagation(); delGallery(b.dataset.del);});
}

function clientLink(gid){ return location.origin+location.pathname+"?g="+gid; }
function copyClientLink(gid){
  const url=clientLink(gid);
  navigator.clipboard.writeText(url).then(()=>toast("Kunden-Link kopiert")).catch(()=>showModal(`<h3>Kunden-Link</h3><input class="inp" value="${esc(url)}" onclick="this.select()"><div style="margin-top:14px"><button class="btn primary" style="width:100%" onclick="this.closest('.modal-bg').remove()">OK</button></div>`));
}

function delGallery(gid){
  const g=AdminState.galleries.find(x=>x.id===gid);

// ---------- Thumbnail-Generierung (Client) ----------
function makeThumb(file, maxW=1000, quality=0.82){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      const dataUrl=c.toDataURL("image/webp",quality);
      resolve({dataUrl, width:img.naturalWidth, height:img.naturalHeight});
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}
function fileToB64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(file); }); }

async function handleUpload(e){
  const files=[...e.target.files]; if(!files.length) return;
  e.target.value="";
  const gid=AdminState.current.gallery.id;
  let done=0, okCount=0, failCount=0;
  const MAX_ORIG=18*1024*1024; // 18 MB Original-Limit (Edge-Function-Payload)
  const prog=showModal(`<h3>Upload läuft…</h3><div class="progress" style="margin:10px 0"><div id="upBar" style="width:0%"></div></div><p class="muted" id="upTxt" style="font-size:13px">0 / ${files.length}</p>`);
  for(const f of files){
    try{
      if(f.size>MAX_ORIG){ throw new Error(`zu groß (${(f.size/1024/1024).toFixed(1)} MB, max 18 MB)`); }
      const thumb=await makeThumb(f);
      const orig_b64=await fileToB64(f);
      const thumb_b64=thumb.dataUrl.split(",")[1];
      await api("admin_upload_image",{gallery_id:gid, filename:f.name, original_b64:orig_b64, thumb_b64, width:thumb.width, height:thumb.height}, AdminState.token);
      okCount++;
    }catch(err){ console.error("Upload",f.name,err); failCount++; toast(f.name+": "+err.message, true); }
    done++;
    const bar=$("#upBar"), txt=$("#upTxt"); if(bar) bar.style.width=(done/files.length*100)+"%"; if(txt) txt.textContent=`${done} / ${files.length}`;
  }
  prog();
  toast(failCount? `${okCount} ok, ${failCount} fehlgeschlagen` : `${okCount} Foto(s) hochgeladen`, failCount>0);
  openAdminGallery(gid);
}

async function importHidrive(){
  const gid=AdminState.current.gallery.id;
  toast("Lese HiDrive-Ordner…");
  try{
    const r=await api("admin_import_hidrive",{gallery_id:gid}, AdminState.token);
    toast(`${r.added} neue Bilder importiert (${r.total} im Ordner)`);
    // Galerie neu laden -> dann fehlende Thumbnails generieren
    const det=await api("admin_gallery_detail",{gallery_id:gid},AdminState.token);
    AdminState.current=det;
    const missing=det.images.filter(i=>!i.thumb_path);
    if(missing.length){
      genThumbsForImported(missing, gid);
    } else {
      renderAdminGallery();
    }
  }catch(e){ toast(e.message,true); }
}

async function genThumbsForImported(missing, gid){
  const prog=showModal(`<h3>Thumbnails werden erstellt…</h3><p class="muted" style="font-size:13px">Originale werden von HiDrive geladen und verkleinert.</p><div class="progress" style="margin:10px 0"><div id="tBar" style="width:0%"></div></div><p class="muted" id="tTxt" style="font-size:13px">0 / ${missing.length}</p>`);
  let done=0;
  for(const img of missing){
    try{
      const u=await api("admin_fetch_original_url",{image_id:img.id}, AdminState.token);
      const blob=await (await fetch(u.url)).blob();
      const file=new File([blob], img.filename, {type:blob.type});
      const thumb=await makeThumb(file);
      await api("admin_set_thumb",{image_id:img.id, thumb_b64:thumb.dataUrl.split(",")[1], width:thumb.width, height:thumb.height}, AdminState.token);
    }catch(err){ console.error("thumb fail",img.filename,err); }
    done++; const b=$("#tBar"),t=$("#tTxt"); if(b) b.style.width=(done/missing.length*100)+"%"; if(t) t.textContent=`${done} / ${missing.length}`;
  }
  prog(); toast("Thumbnails fertig");
  openAdminGallery(gid);
}

}

function favCount(){ return ClientState.images.filter(i=>i.favorited).length; }
function selCount(){ return ClientState.images.filter(i=>i.selected).length; }
function commentsFor(imgId){ return ClientState.comments.filter(c=>c.image_id===imgId); }
function selOrder(imgId){ // 1-basierte Position in der Auswahl
  const sel=ClientState.images.filter(i=>i.selected);
  return sel.findIndex(i=>i.id===imgId)+1;
}
function eur(n){ return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n); }
// Liefert Infos zu Inklusiv-/Extra-Bildern, Aufpreis und Mengenrabatt
function extraInfo(){
  const g=ClientState.gallery;
  const limit=g.selection_limit||0;
  const price=(g.extra_price!=null)?Number(g.extra_price):0;
  const sc=selCount();
  const hasExtraPricing = limit>0 && price>0;
  const extra = (limit>0 && sc>limit) ? (sc-limit) : 0;
  const gross = extra*price;
  // höchste erreichte Rabattstufe ermitteln
  const tiers = normalizeTiers(g.discount_tiers);
  let percent = 0, tierMin = 0;
  for(const t of tiers){ if(extra >= t.min && t.percent > percent){ percent = t.percent; tierMin = t.min; } }
  const discount = gross * percent/100;
  const sum = gross - discount;
  // nächste Stufe (für „noch X bis Rabatt"-Hinweis)
  let next=null;
  for(const t of tiers){ if(extra < t.min){ if(!next || t.min < next.min) next=t; } }
  return { limit, price, sc, hasExtraPricing, extra, gross, percent, tierMin, discount, sum, tiers, next };
}
// Staffeln säubern + sortieren: [{min,percent}], nur gültige, aufsteigend
function normalizeTiers(raw){
  if(!Array.isArray(raw)) return [];
  return raw
    .map(t=>({ min: parseInt(t.min), percent: parseFloat(t.percent) }))
    .filter(t=>Number.isFinite(t.min) && t.min>0 && Number.isFinite(t.percent) && t.percent>0)
    .sort((a,b)=>a.min-b.min);
}

// Auswahl-/Preis-Karte (offen + bestätigt, mit Extra-Bild-Aufpreis)
function selectionCard(){
  const g=ClientState.gallery;
  const confirmed=g.confirmed;
  const { limit, price, sc, hasExtraPricing, extra, sum } = extraInfo();
  if(!limit){
    // kein Limit -> nur einfache Anzeige
    return confirmed
      ? `<div class="card" style="padding:14px 18px; margin-bottom:18px; border-color:#2a4a2a"><div style="display:flex; align-items:center; gap:10px"><span style="font-size:20px">✓</span><div><b style="color:var(--ok)">Auswahl bestätigt</b><div class="muted" style="font-size:13px">${sc} Foto${sc===1?"":"s"} ausgewählt. Du kannst deine Auswahl jederzeit ändern und erneut bestätigen.</div></div></div></div>`
      : "";
  }
  const within = Math.min(sc, limit);
  const barIncl = Math.min(100, within/limit*100);
  const info = extraInfo();
  const head = confirmed
    ? `<div style="display:flex; align-items:center; gap:10px; margin-bottom:12px"><span style="font-size:20px">✓</span><div><b style="color:var(--ok)">Auswahl bestätigt</b><div class="muted" style="font-size:13px">Du kannst deine Auswahl jederzeit ändern und erneut bestätigen.</div></div></div>`
    : "";
  // „noch X bis -Y%"-Hinweis (nur wenn es überhaupt Extra-Pricing gibt)
  const nextHint = (hasExtraPricing && info.next)
    ? `<div class="muted2" style="font-size:12px; margin-top:8px">Noch <b>${info.next.min - info.extra}</b> Extra-Foto${(info.next.min-info.extra)===1?"":"s"} bis <b>−${info.next.percent}%</b> Rabatt.</div>`
    : "";
  return `<div class="card" style="padding:16px 18px; margin-bottom:18px${confirmed?'; border-color:#2a4a2a':''}">
    ${head}
    <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px">
      <span class="muted">Im Paket enthalten</span>
      <span class="mono"><b id="selNum">${sc}</b> von ${limit}</span>
    </div>
    <div class="progress" style="margin-bottom:${(hasExtraPricing&&extra>0)?'14px':'0'}">
      <div id="selBar" style="width:${barIncl}%"></div>
    </div>
    ${hasExtraPricing ? (
      extra>0
      ? `<div style="background:var(--panel2); border:1px solid var(--line2); border-radius:6px; padding:12px 14px">
           <div style="display:flex; justify-content:space-between; align-items:center; font-size:14px">
             <span><b>${extra}</b> Extra-Foto${extra===1?"":"s"} <span class="muted">× ${eur(price)}</span></span>
             <span class="mono">${eur(info.gross)}</span>
           </div>
           ${info.percent>0?`<div style="display:flex; justify-content:space-between; align-items:center; font-size:14px; margin-top:5px; color:var(--ok)">
             <span>Mengenrabatt −${info.percent}% <span class="muted2">(ab ${info.tierMin})</span></span>
             <span class="mono">−${eur(info.discount)}</span>
           </div>`:""}
           <div class="hr" style="margin:9px 0"></div>
           <div style="display:flex; justify-content:space-between; align-items:center; font-size:15px; font-weight:700">
             <span>Aufpreis</span><span>${eur(info.sum)}</span>
           </div>
           ${nextHint}
           <div class="muted2" style="font-size:12px; margin-top:8px">${limit} Foto${limit===1?"":"s"} sind im Paket enthalten. Jedes weitere Foto kostet ${eur(price)} Aufpreis.</div>
         </div>`
      : `<div class="muted2" style="font-size:12px">${limit} Foto${limit===1?"":"s"} im Paket enthalten. Jedes weitere kostet ${eur(price)} Aufpreis.${info.tiers.length?` Mengenrabatt ab ${info.tiers[0].min} Extra-Fotos.`:""}</div>`
    ) : (
      sc>limit
      ? `<div class="muted2" style="font-size:12px; color:var(--danger)">Du hast mehr als ${limit} Foto${limit===1?"":"s"} gewählt.</div>`
      : ""
    )}
  </div>`;
}

async function sendComment(imgId){
  const ta=$("#lbCmtInput"); const body=ta.value.trim();
  if(!body) return;
  try{
    const r=await api("gallery_comment",{gallery_id:ClientState.gid, image_id:imgId, body}, ClientState.token);
    ClientState.comments.push(r.comment); ta.value="";
    drawComments(imgId);
    const tg=$("#lbCmtToggle"); if(tg) tg.textContent="💬 "+commentsFor(imgId).length;
  }catch(e){ toast(e.message,true); }
}
async function downloadImage(imgId){
  try{
    toast("Download wird vorbereitet…");
    const r=await api("gallery_download",{gallery_id:ClientState.gid, image_id:imgId}, ClientState.token);
    window.open(r.url,"_blank");
  }catch(e){ toast(e.message,true); }
}

// ---------- generisches Modal ----------
function showModal(html, setup){
  const bg=document.createElement("div"); bg.className="modal-bg";
  bg.innerHTML=`<div class="modal">${html}</div>`;
  document.body.appendChild(bg);
  const close=()=>bg.remove();
  bg.onclick=e=>{ if(e.target===bg) close(); };
  if(setup) setup(close);
  return close;
}
